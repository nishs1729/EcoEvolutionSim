strategy = "RANDOM_WALK" # options: RANDOM_WALK, LANGEVIN, CORRELATED_RW, ACTIVE_BROWNIAN
base_speed = 0.5 # km/day
noise_strength = 0.1 # units vary by strategy (km/day^(3/2) or radians/sqrt(day))
friction = 0.1 # 1/day

# ecology / interaction
r_interact = 0.01 # km
metabolic_rate = 10.0 # Joules/day