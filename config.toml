# EcoEvolutionSim Configuration

# Simulation
n_agents = 100_000 # initial number of agents
max_agents = 2_000_000 # max allocated agents
world_width = 50.0 # km
world_length = 100.0 # km
cell_size = 0.5 # km
steps_per_frame = 2 # steps
dt = 1.0 # days (time difference per simulation step)

